name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install PyTorch (CPU) and JAX (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[ci]"

      - name: Show installed versions
        run: |
          python -c "import torch, jax, flax; print('torch', torch.__version__); print('jax', jax.__version__); print('flax', flax.__version__)"

      - name: Run tests
        env:
          JAX_PLATFORMS: cpu
        run: pytest tests/ -v
